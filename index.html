<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProPM - Workspace</title>
    <style>
        /* Clean, Modern SaaS Styling */
        :root { --primary: #2563eb; --bg: #f8fafc; --surface: #ffffff; --text: #0f172a; --border: #e2e8f0; }
        body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        .card { background: var(--surface); padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid var(--border); width: 100%; max-width: 400px; text-align: center; margin-top: 50px; }
        .dashboard { width: 100%; max-width: 900px; background: var(--surface); padding: 20px; border-radius: 12px; margin-top: 20px; border: 1px solid var(--border); }
        
        h1, h2, h3 { color: var(--primary); margin-top: 0; }
        .hidden { display: none !important; }
        
        button { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 15px; }
        button.outline { background: transparent; color: var(--text); border: 1px solid var(--border); width: auto; padding: 8px 15px; }
        
        .header-bar { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--border); padding-bottom: 15px; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div id="login-view" class="card">
        <h1>ProPM</h1>
        <p style="color: #64748b;">Sign in to your workspace.</p>
        <button id="btn-login" onclick="signIn()">Continue with Google</button>
        <p id="auth-status" style="font-size: 13px; margin-top: 15px; color: #ef4444;"></p>
    </div>

    <div id="admin-view" class="dashboard hidden">
        <div class="header-bar">
            <div>
                <h2>Admin Console</h2>
                <span style="background: #e0e7ff; color: #2563eb; padding: 4px 8px; border-radius: 12px; font-size: 12px; font-weight: bold;">ADMIN ROLE</span>
            </div>
            <div>
                <span class="user-name" style="margin-right: 15px; font-weight: 500;"></span>
                <button class="outline" onclick="signOutUser()">Log Out</button>
            </div>
        </div>
        <style>
            .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
            @media (max-width: 768px) { .grid-2 { grid-template-columns: 1fr; } }
            .admin-module { background: #f8fafc; padding: 15px; border-radius: 8px; border: 1px solid #e2e8f0; margin-bottom: 20px; }
            .admin-module input, .admin-module select { margin-bottom: 10px; }
        </style>

        <div class="grid-2">
            <div class="admin-module">
                <h3>2. Add Team Member</h3>
                <input type="email" id="member-email" placeholder="Colleague's Google Email">
                <input type="text" id="member-name" placeholder="Full Name">
                <select id="member-role">
                    <option value="member">Team Member</option>
                    <option value="admin">Admin</option>
                </select>
                <button onclick="addMember()">Register Member</button>
                <p id="member-status" style="font-size: 13px; margin-top: 10px; display: none;"></p>

                <div style="margin-top: 20px; border-top: 1px solid #cbd5e1; padding-top: 15px;">
                    <h4 style="margin-top: 0; color: #475569;">Registered Members</h4>
                    <div id="members-display" style="font-size: 14px; display: flex; flex-direction: column; gap: 8px;">
                        <p style="color: #94a3b8; font-style: italic;">Loading members...</p>
                    </div>
                </div>
            </div>
           </div>

            <div class="admin-module">
                <h3>2. Add Team Member</h3>
                <input type="email" id="member-email" placeholder="Colleague's Google Email">
                <input type="text" id="member-name" placeholder="Full Name">
                <select id="member-role">
                    <option value="member">Team Member</option>
                    <option value="admin">Admin</option>
                </select>
                <button onclick="addMember()">Register Member</button>
                <p id="member-status" style="font-size: 13px; margin-top: 10px; display: none;"></p>
            </div>
        </div>

        <div class="admin-module">
            <h3>3. Assign a Task</h3>
            <div class="grid-2">
                <div>
                    <input type="text" id="task-title" placeholder="Task Description (e.g., Draft Physics Lab)">
                    <input type="text" id="task-project" placeholder="Project Name (e.g., Grade 8 Curriculum)">
                </div>
                <div>
                    <input type="email" id="task-assignee" placeholder="Assign To (Email Address)">
                    <button onclick="assignTask()" style="margin-top: 0;">Assign Task</button>
                    <p id="task-status" style="font-size: 13px; margin-top: 10px; display: none;"></p>
                </div>
            </div>
        </div>
    </div>

    <div id="member-view" class="dashboard hidden">
        <div class="header-bar">
            <div>
                <h2>My Tasks</h2>
                <span style="background: #dcfce7; color: #166534; padding: 4px 8px; border-radius: 12px; font-size: 12px; font-weight: bold;">TEAM MEMBER ROLE</span>
            </div>
            <div>
                <span class="user-name" style="margin-right: 15px; font-weight: 500;"></span>
                <button class="outline" onclick="signOutUser()">Log Out</button>
            </div>
        </div>
        <p>Your task list and status updates will go here in Step 4.</p>
    </div>
<script type="module">
        // 1. Direct web imports (Bypassing the need for 'npm install')
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
       import { getFirestore, doc, getDoc, setDoc, addDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // 2. YOUR SPECIFIC FIREBASE CONFIGURATION
        const firebaseConfig = {
            apiKey: "AIzaSyCo_tMyCAhdUAMp_Mx2popJp2nqurO7SlY",
            authDomain: "pm-pro-80c67.firebaseapp.com",
            projectId: "pm-pro-80c67",
            storageBucket: "pm-pro-80c67.firebasestorage.app",
            messagingSenderId: "553036723851",
            appId: "1:553036723851:web:3167a4def993500c39468e"
        };

        // 3. Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        // 4. Trigger Google Login Window
        window.signIn = () => {
            document.getElementById('auth-status').innerText = "Connecting...";
            document.getElementById('auth-status').style.color = "#64748b";
            signInWithPopup(auth, provider).catch((error) => {
                document.getElementById('auth-status').innerText = error.message;
                document.getElementById('auth-status').style.color = "#ef4444";
            });
        };

        // 5. Trigger Log Out
        window.signOutUser = () => { signOut(auth); };

        // 6. THE GATEKEEPER: Routes you to Admin or Member screens
        onAuthStateChanged(auth, async (user) => {
            const loginView = document.getElementById('login-view');
            const adminView = document.getElementById('admin-view');
            const memberView = document.getElementById('member-view');

            if (user) {
                loginView.classList.add('hidden');
                document.querySelectorAll('.user-name').forEach(el => el.innerText = user.displayName);
                
                try {
                    const userRef = doc(db, "users", user.email);
                    const userSnap = await getDoc(userRef);

                    if (userSnap.exists()) {
                        const userData = userSnap.data();
                        if (userData.role === 'admin') {
                            loadProjects();
                            loadMembers();
                            adminView.classList.remove('hidden');
                            memberView.classList.add('hidden');
                        } else {
                            memberView.classList.remove('hidden');
                            adminView.classList.add('hidden');
                        }
                    } else {
                        // First time login! Create a safe, default member profile.
                        await setDoc(userRef, {
                            name: user.displayName,
                            email: user.email,
                            role: "member", 
                            teamId: null,
                            registeredAt: new Date().toISOString()
                        });
                        
                        memberView.classList.remove('hidden');
                        adminView.classList.add('hidden');
                    }
                } catch (error) {
                    console.error("Error reading database:", error);
                    loginView.classList.remove('hidden');
                    document.getElementById('auth-status').innerText = "Database connection error.";
                }
            } else {
                loginView.classList.remove('hidden');
                adminView.classList.add('hidden');
                memberView.classList.add('hidden');
                document.getElementById('auth-status').innerText = "";
            }
        });

// --- ADMIN FUNCTIONS ---

        // 1. Save a new Project
        window.createProject = async () => {
            const title = document.getElementById('proj-title').value;
            const deadline = document.getElementById('proj-deadline').value;
            const notes = document.getElementById('proj-notes').value;
            const status = document.getElementById('proj-status');

            if (!title) return alert("Please enter a project title.");
            status.style.display = 'block'; status.style.color = '#64748b'; status.innerText = "Saving...";

            try {
                await addDoc(collection(db, "projects"), {
                    title: title, deadline: deadline, notes: notes, createdAt: new Date().toISOString()
                });
                status.style.color = '#10b981'; status.innerText = "Project saved!";
                document.getElementById('proj-title').value = ''; document.getElementById('proj-notes').value = '';
                setTimeout(() => status.style.display = 'none', 3000);
            } catch (error) { status.style.color = '#ef4444'; status.innerText = "Error saving project."; }
        };
// Fetch and display projects
        window.loadProjects = async () => {
            const displayArea = document.getElementById('projects-display');
            displayArea.innerHTML = ''; // Clear the "Loading..." text

            try {
                // Fetch all documents from the "projects" collection
                const querySnapshot = await getDocs(collection(db, "projects"));
                
                if (querySnapshot.empty) {
                    displayArea.innerHTML = '<p style="color: #94a3b8;">No active projects.</p>';
                    return;
                }

                // Loop through each project and create a little visual card for it
                querySnapshot.forEach((doc) => {
                    const project = doc.data();
                    displayArea.innerHTML += `
                        <div style="background: white; padding: 10px; border: 1px solid #e2e8f0; border-radius: 6px;">
                            <strong style="color: #2563eb;">${project.title}</strong>
                            <div style="color: #64748b; font-size: 12px; margin-top: 4px;">Due: ${project.deadline}</div>
                        </div>
                    `;
                });
            } catch (error) {
                console.error("Error loading projects: ", error);
                displayArea.innerHTML = '<p style="color: #ef4444;">Failed to load projects.</p>';
            }
        };

// Fetch and display team members
        window.loadMembers = async () => {
            const displayArea = document.getElementById('members-display');
            displayArea.innerHTML = ''; // Clear the "Loading..." text

            try {
                // Fetch all documents from the "users" collection
                const querySnapshot = await getDocs(collection(db, "users"));
                
                if (querySnapshot.empty) {
                    displayArea.innerHTML = '<p style="color: #94a3b8;">No members found.</p>';
                    return;
                }

                // Loop through each user and create a visual card
                querySnapshot.forEach((doc) => {
                    const user = doc.data();
                    
                    // Set colors based on role
                    const badgeColor = user.role === 'admin' ? '#e0e7ff' : '#dcfce7';
                    const textColor = user.role === 'admin' ? '#2563eb' : '#166534';

                    displayArea.innerHTML += `
                        <div style="background: white; padding: 10px; border: 1px solid #e2e8f0; border-radius: 6px; display: flex; justify-content: space-between; align-items: center;">
                            <div>
                                <strong style="color: #0f172a;">${user.name || 'Unknown Name'}</strong>
                                <div style="color: #64748b; font-size: 12px; margin-top: 4px;">${user.email}</div>
                            </div>
                            <span style="background: ${badgeColor}; color: ${textColor}; padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: bold; text-transform: uppercase;">
                                ${user.role}
                            </span>
                        </div>
                    `;
                });
            } catch (error) {
                console.error("Error loading members: ", error);
                displayArea.innerHTML = '<p style="color: #ef4444;">Failed to load members.</p>';
            }
        };

        // 2. Register a Team Member
        window.addMember = async () => {
            const email = document.getElementById('member-email').value.toLowerCase().trim();
            const name = document.getElementById('member-name').value;
            const role = document.getElementById('member-role').value;
            const status = document.getElementById('member-status');

            if (!email || !name) return alert("Please enter email and name.");
            status.style.display = 'block'; status.style.color = '#64748b'; status.innerText = "Registering...";

            try {
                // Use setDoc so their email becomes their exact database ID
                await setDoc(doc(db, "users", email), {
                    email: email, name: name, role: role, registeredAt: new Date().toISOString()
                });
                status.style.color = '#10b981'; status.innerText = "Member added!";
loadMembers()
                document.getElementById('member-email').value = ''; document.getElementById('member-name').value = '';
                setTimeout(() => status.style.display = 'none', 3000);
            } catch (error) { status.style.color = '#ef4444'; status.innerText = "Error adding member."; }
        };

        // 3. Assign a Task
        window.assignTask = async () => {
            const title = document.getElementById('task-title').value;
            const project = document.getElementById('task-project').value;
            const assignee = document.getElementById('task-assignee').value.toLowerCase().trim();
            const statusMsg = document.getElementById('task-status');

            if (!title || !assignee) return alert("Task description and assignee email are required.");
            statusMsg.style.display = 'block'; statusMsg.style.color = '#64748b'; statusMsg.innerText = "Assigning...";

            try {
                await addDoc(collection(db, "tasks"), {
                    title: title,
                    project: project,
                    assignedTo: assignee,
                    status: "to-do", // Default status for new tasks
                    assignedAt: new Date().toISOString()
                });
                statusMsg.style.color = '#10b981'; statusMsg.innerText = "Task assigned!";
                document.getElementById('task-title').value = '';
                setTimeout(() => statusMsg.style.display = 'none', 3000);
            } catch (error) { statusMsg.style.color = '#ef4444'; statusMsg.innerText = "Error assigning task."; }
        };

    </script>
    </body>
</html>
